<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">My Profile</span>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
  </nav>

  <div class="container pb-5">
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <div id="loadingBox" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Loading profile...</p>
    </div>

    <div class="row justify-content-center d-none" id="profileContent">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title">Account Info</h5>
            <p class="mb-1"><strong>Username:</strong> <span id="viewUsername"></span></p>
            <p class="mb-1"><strong>Email:</strong> <span id="viewEmail"></span></p>
            <p class="mb-0 text-muted small"><strong>Member since:</strong> <span id="viewCreatedAt"></span></p>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-3">Profile Details</h5>

            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name">
              </div>
              <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" id="age" min="0" max="120">
              </div>
              <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea class="form-control" id="bio" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Interests (comma separated)</label>
                <input type="text" class="form-control" id="interests">
              </div>
              <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
