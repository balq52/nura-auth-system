<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-4 text-center">Create an Account</h3>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="registerForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required minlength="3">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required minlength="6">
              </div>

              <hr>
              <p class="text-muted small">Optional profile details</p>

              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name">
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Age</label>
                  <input type="number" class="form-control" id="age" min="0" max="120">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea class="form-control" id="bio" rows="2"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Interests (comma separated)</label>
                <input type="text" class="form-control" id="interests" placeholder="e.g. music, coding, travel">
              </div>

              <button type="submit" class="btn btn-primary w-100" id="registerBtn">Register</button>
            </form>

            <p class="text-center mt-3 mb-0">
              Already have an account? <a href="login.html">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
